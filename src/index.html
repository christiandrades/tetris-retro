<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Tetris Retro</title>
  <base href="/">

  <!-- Viewport & PWA essentials -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#00f0f0">
  <meta name="description" content="Jogo de Tetris com visual neon retrô e Modo Prisma exclusivo.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tetris Retro">

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Ícones -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- Registro do Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.warn('Service Worker não registrado:', err));
      });
    }
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
